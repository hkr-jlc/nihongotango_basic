<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>日本語単語 Basic</title>
<link rel="icon" href="nihongotango_basic.ico" type="image/x-icon">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Noto+Serif+JP:wght@500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://w.soundcloud.com/player/api.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:'Zen Kaku Gothic New',sans-serif;
  background:var(--paper);
  color:var(--ink);
}
:root{
  --paper:#F7F3EA;
  --ink:#231F1B;
  --muted:#8A8072;
  --red:#B6432C;
  --red-deep:#8C3220;
  --indigo:#33475B;
  --card:#FFFFFF;
  --border:#E4DBC8;
  --border-strong:#D8CBAE;
  --radius:14px;
  --radius-sm:9px;
}
.app{max-width:480px;margin:0 auto;min-height:100dvh;padding-bottom:150px;position:relative}

/* ── Header ── */
.header{
  padding:22px 18px 16px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);
  background:var(--paper);
}
.brand{display:flex;align-items:center;gap:12px}
.stamp{
  width:42px;height:42px;border-radius:50%;
  border:2px solid var(--red);
  display:flex;align-items:center;justify-content:center;
  font-family:'Noto Serif JP',serif;font-weight:700;font-size:18px;
  color:var(--red);flex-shrink:0;
}
.brand-title{font-family:'Noto Serif JP',serif;font-size:19px;font-weight:700;line-height:1.2}
.brand-sub{font-size:11.5px;color:var(--muted);letter-spacing:.03em;margin-top:2px}

/* ── Unit selector strip ── */
.unit-strip{
  padding:12px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
}
.unit-strip select{
  flex:1;font-size:14px;padding:9px 10px;border-radius:var(--radius-sm);
  border:1px solid var(--border-strong);background:var(--card);color:var(--ink);
}
.unit-dropdown{position:relative;flex:1}
.unit-dropdown-btn{
  font-size:14px;padding:7px 10px;border-radius:var(--radius-sm);
  border:1px solid var(--border-strong);background:var(--card);color:var(--ink);
  cursor:pointer;display:flex;align-items:flex-start;gap:6px;line-height:1.25;
}
.unit-dropdown-btn .u-prefix{font-weight:600;white-space:nowrap;flex-shrink:0}
.unit-dropdown-btn .u-text{display:flex;flex-direction:column;gap:1px}
.unit-dropdown-btn .u-line1{font-weight:600}
.unit-dropdown-btn .u-line2{font-size:12px;color:var(--muted)}
.unit-dropdown-list{
  display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:20;
  max-height:280px;overflow-y:auto;background:var(--card);
  border:1px solid var(--border-strong);border-radius:var(--radius-sm);
  box-shadow:0 6px 18px rgba(0,0,0,.12);
}
.unit-dropdown-list.open{display:block}
.unit-dropdown-item{
  padding:7px 10px;cursor:pointer;line-height:1.25;border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;gap:6px;
}
.unit-dropdown-item:last-child{border-bottom:none}
.unit-dropdown-item:hover:not(.disabled){background:var(--paper)}
.unit-dropdown-item .u-prefix{font-weight:600;font-size:14px;white-space:nowrap;flex-shrink:0}
.unit-dropdown-item .u-text{display:flex;flex-direction:column;gap:1px}
.unit-dropdown-item .u-line1{font-weight:600;font-size:14px}
.unit-dropdown-item .u-line2{font-size:12px;color:var(--muted)}
.unit-dropdown-item.disabled{opacity:.4;cursor:not-allowed}
.unit-dropdown-item.selected{background:var(--paper)}
.unit-tag{
  font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--muted);
  background:var(--card);border:1px solid var(--border);padding:5px 8px;border-radius:6px;white-space:nowrap;
}

/* ── Tabs ── */
.tabs{
  display:grid;grid-template-columns:repeat(2,1fr);
  border-bottom:1px solid var(--border);
  background:var(--paper);position:sticky;top:0;z-index:10;
}
.tab{
  padding:13px 0;font-size:13px;font-weight:500;color:var(--muted);
  cursor:pointer;text-align:center;border-bottom:2px solid transparent;
  display:flex;flex-direction:column;align-items:center;gap:2px;
}
.tab .tab-jp{font-family:'Noto Serif JP',serif;font-size:15px}
.tab.active{color:var(--red);border-bottom-color:var(--red)}

.content{padding:16px}

/* ── Vocab card ── */
.kotoba-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  margin-bottom:12px;overflow:hidden;
}
.kotoba-main{
  display:flex;align-items:center;gap:12px;padding:14px 14px;cursor:pointer;
}
.play-dot{
  width:38px;height:38px;border-radius:50%;flex-shrink:0;
  border:1.5px solid var(--red);color:var(--red);
  display:flex;align-items:center;justify-content:center;font-size:13px;
  transition:background .15s,color .15s;
}
.play-dot.playing{background:var(--red);color:#fff}
.kotoba-text{flex:1;min-width:0}
.kotoba-kanji{font-family:'Noto Serif JP',serif;font-weight:700;font-size:20px}
.kotoba-yomi{font-size:12.5px;color:var(--muted);margin-top:2px}
.kotoba-arti{font-size:13.5px;color:var(--indigo);margin-top:3px;font-weight:500}
.kotoba-chevron{display:none}

.kalimat-list{display:block;border-top:1px solid var(--border);background:#FCFAF4}
.kalimat-item{
  padding:12px 14px;display:flex;gap:10px;align-items:flex-start;
  border-top:1px dashed var(--border);
  scroll-margin:120px 0;
}
.kalimat-item:first-child{border-top:none}
.kalimat-item.active{background:#FFE9DE}
.kalimat-text{flex:1;min-width:0}
.kalimat-jp{font-size:14.5px;line-height:1.5}
.kalimat-yomi{font-size:11.5px;color:var(--muted);margin-top:2px}
.kalimat-id{font-size:12.5px;color:var(--indigo);margin-top:4px}
.play-dot.small{width:30px;height:30px;font-size:11px;margin-top:1px}

/* ── Highlight aktif (baca-along) ── */
.kotoba-card{scroll-margin:120px 0}
.kotoba-card.active{border-color:var(--red);box-shadow:0 0 0 2px rgba(182,67,44,.22)}
.kotoba-card.active .kotoba-main{background:#FFF3ED}
.track-header{
  font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--muted);
  margin:18px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
}
.track-header:first-child{margin-top:0}
.track-header .th-tema{font-family:'Zen Kaku Gothic New',sans-serif;font-size:13px;color:var(--ink);font-weight:700}

/* ── Player bar ── */
.player-bar{
  position:fixed;left:0;right:0;bottom:0;background:var(--card);
  border-top:1px solid var(--border);box-shadow:0 -3px 12px rgba(35,31,27,.08);
  padding:9px 16px 12px;z-index:40;display:none;
}
.player-bar.show{display:block}
.player-bar-inner{max-width:480px;margin:0 auto}
.player-info{font-size:11.5px;color:var(--muted);display:flex;justify-content:space-between;gap:8px;margin-bottom:8px;overflow:hidden}
.player-info .pi-word{color:var(--ink);font-weight:700;font-family:'Noto Serif JP',serif;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-info .pi-track{white-space:nowrap;flex-shrink:0}
.player-controls{display:flex;align-items:center;justify-content:space-between;gap:8px}
.player-btn{
  width:38px;height:38px;border-radius:50%;border:1px solid var(--border-strong);
  background:var(--paper);display:flex;align-items:center;justify-content:center;
  font-size:13px;color:var(--ink);cursor:pointer;flex-shrink:0;
}
.player-btn:disabled{opacity:.3}
.player-btn.main{width:48px;height:48px;background:var(--red);color:#fff;border:none;font-size:16px}

/* ── Flashcard ── */
.fc-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.fc-nav span{font-size:13px;color:var(--muted);font-family:'JetBrains Mono',monospace}
.fc-btn{
  width:44px;height:44px;border-radius:50%;border:1px solid var(--border-strong);
  background:var(--card);cursor:pointer;font-size:18px;color:var(--ink);
  display:flex;align-items:center;justify-content:center;
}
.fc-btn:disabled{opacity:.3}
.flashcard{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  min-height:230px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:30px 20px;cursor:pointer;box-shadow:0 3px 10px rgba(35,31,27,.06);
  position:relative;user-select:none;
}
.fc-kanji{font-family:'Noto Serif JP',serif;font-size:44px;font-weight:700}
.fc-yomi{font-size:14px;color:var(--muted);margin-top:10px}
.fc-arti{font-size:22px;font-weight:600;color:var(--indigo);text-align:center}
.fc-hint{font-size:11px;color:var(--muted);letter-spacing:.03em;position:absolute;bottom:14px}
.fc-playbtn{
  position:absolute;top:14px;right:14px;
  width:36px;height:36px;border-radius:50%;border:1.5px solid var(--red);color:var(--red);
  display:flex;align-items:center;justify-content:center;font-size:12px;
}
.fc-playbtn.playing{background:var(--red);color:#fff}
.fc-actions{display:flex;gap:10px;margin-top:16px}
.fc-actions button{
  flex:1;padding:12px;border-radius:var(--radius-sm);border:1px solid var(--border-strong);
  background:var(--card);font-size:13.5px;font-weight:500;cursor:pointer;color:var(--ink);
}

/* ── Settings ── */
.set-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:14px}
.set-title{font-size:13.5px;font-weight:700;margin-bottom:6px}
.set-desc{font-size:11.5px;color:var(--muted);margin-bottom:10px;line-height:1.5}
.set-card textarea{
  width:100%;min-height:100px;font-family:'JetBrains Mono',monospace;font-size:12px;
  border:1px solid var(--border-strong);border-radius:var(--radius-sm);padding:10px;
  background:var(--paper);color:var(--ink);resize:vertical;
}
.set-row{display:flex;gap:8px;margin-top:10px}
.set-row button{
  flex:1;padding:10px;border-radius:var(--radius-sm);border:none;
  background:var(--red);color:#fff;font-weight:600;font-size:13px;cursor:pointer;
}
.set-row button.ghost{background:transparent;border:1px solid var(--border-strong);color:var(--ink)}
.unit-list-item{
  display:flex;justify-content:space-between;align-items:center;
  font-size:12.5px;padding:8px 0;border-top:1px dashed var(--border);
}
.unit-list-item:first-child{border-top:none}
.unit-del{color:var(--red);font-size:11px;cursor:pointer;font-weight:600}
.toast{
  position:fixed;bottom:100px;left:50%;transform:translateX(-50%);
  background:var(--ink);color:#fff;padding:9px 16px;border-radius:20px;font-size:12.5px;
  opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:50;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="brand">
      <div class="stamp">日</div>
      <div>
        <div class="brand-title">日本語単語</div>
        <div class="brand-sub">KOSAKATA &amp; CONTOH KALIMAT</div>
      </div>
    </div>
  </div>

  <div class="unit-strip">
    <select id="sel-unit" style="display:none"></select>
    <div class="unit-dropdown" id="unit-dropdown">
      <div class="unit-dropdown-btn" id="unit-dropdown-btn"></div>
      <div class="unit-dropdown-list" id="unit-dropdown-list"></div>
    </div>
    <div class="unit-tag" id="unit-tag">CD- / T-</div>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="kosakata" onclick="switchTab('kosakata')"><span class="tab-jp">単語</span>Kosakata</div>
    <div class="tab" data-tab="flashcard" onclick="switchTab('flashcard')"><span class="tab-jp">カード</span>Flashcard</div>
  </div>

  <div class="content">

    <div id="view-kosakata"></div>

    <div id="view-flashcard" style="display:none">
      <div class="fc-nav">
        <button class="fc-btn" id="fc-prev" onclick="fcNav(-1)">‹</button>
        <span id="fc-pos">1 / 1</span>
        <button class="fc-btn" id="fc-next" onclick="fcNav(1)">›</button>
      </div>
      <div id="fc-card-wrap"></div>
      <div class="fc-actions">
        <button onclick="shuffleUnit()">🔀 Acak urutan</button>
        <button onclick="resetUnitOrder()">↺ Urutan asli</button>
      </div>
    </div>

  </div>

  <div class="player-bar show" id="player-bar">
    <div class="player-bar-inner">
      <div class="player-info">
        <span class="pi-word" id="pi-word">—</span>
        <span class="pi-track" id="pi-track">—</span>
      </div>
      <div class="player-controls">
        <button class="player-btn" id="pb-prevtrack" onclick="uiPrevTrack()" title="Track sebelumnya">|◀</button>
        <button class="player-btn" id="pb-previd" onclick="uiPrevId()" title="Kata sebelumnya">◀◀</button>
        <button class="player-btn main" id="pb-playpause" onclick="uiPlayPause()" title="Play/Pause">▶</button>
        <button class="player-btn" id="pb-nextid" onclick="uiNextId()" title="Kata selanjutnya">▶▶</button>
        <button class="player-btn" id="pb-nexttrack" onclick="uiNextTrack()" title="Track selanjutnya">▶|</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <div id="sc-widgets" style="position:absolute;width:0;height:0;overflow:hidden;"></div>
</div>

<script>
// ────────────────────────────────────────────────────────────────────────
// DATA
// Data kosakata (UNITS) sekarang disimpan terpisah di file
// "nihongotango_basic.json" dan dimuat via fetch() di loadData() di bawah.
// Pastikan file JSON ini berada di folder yang sama dengan file HTML ini.
// ────────────────────────────────────────────────────────────────────────
let UNITS = [];
let UNIT_TITLES = [];

async function loadData(){
  const res = await fetch('nihongotango_basic.json');
  if(!res.ok) throw new Error('Gagal memuat nihongotango_basic.json');
  const json = await res.json();
  UNITS = json.units;
  UNIT_TITLES = json.unitTitles || [];
}

// ─── Sumber audio: link trek SoundCloud langsung per nomor track. ───
// ─── Pola URL trek CD1 dan CD2 berbeda, jadi masing2 punya fungsi builder sendiri ───
const TRACK_URL = {
  1: (n)=> `https://soundcloud.com/user-95896001/track-${n}`,           // CD1: track-1, track-2, ...
  2: (n)=> `https://soundcloud.com/user-95896001/${String(n).padStart(2,'0')}-1` // CD2: 01-1, 02-1, ...
};

let trackPtr = 0;        // index ke UNITS (tiap elemen UNITS = satu track)
let fcOrder = [];
let fcIdx = 0;

// ── Engine "baca-along" utk tab Kosakata ──
let flatSegments = [];   // segmen (kotoba+kalimat) milik unit yg sedang ditampilkan
let curSegIdx = -1;      // index aktif di flatSegments
let isPlayingBaca = false;
let bacaProgressHandler = null;

function currentTrackObj(){ return UNITS[trackPtr]; }
function currentUnitNumber(){ return currentTrackObj() ? currentTrackObj().unit : null; }
function unitTrackRefs(unitNumber){
  const out = [];
  UNITS.forEach((u,i)=>{ if(u.unit===unitNumber) out.push(i); });
  return out;
}

// (Catatan: dulu di sini ada saveState()/loadState() yg nyimpen UNITS ke
// window.storage. Dihapus karena bisa menimpa data JSON terbaru dgn cache
// lama — UNITS harus SELALU berasal dari nihongotango_basic.json.)

// ────────────────────────────────────────────────────────────────────────
// HELPERS
// ────────────────────────────────────────────────────────────────────────
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1800);
}

// ── SoundCloud widget (satu iframe/widget dipakai bergantian, di-load ──
// ── ulang tiap kali pindah trek yang berbeda dari sebelumnya) ──
let scWidget = null;
let scReady = false;
let scPending = [];
let scLoadedKey = null;
let progressHandler = null;

function ensureWidget(cb){
  if(scReady){ cb(); return; }
  scPending.push(cb);
  if(scWidget) return; // sudah dalam proses inisialisasi
  const iframe = document.createElement('iframe');
  iframe.width = '1'; iframe.height = '1'; iframe.frameBorder = '0';
  iframe.allow = 'autoplay';
  const bootUrl = TRACK_URL[1](1);
  iframe.src = `https://w.soundcloud.com/player/?url=${encodeURIComponent(bootUrl)}&auto_play=false&show_artwork=false&visual=false`;
  document.getElementById('sc-widgets').appendChild(iframe);
  scWidget = SC.Widget(iframe);
  scWidget.bind(SC.Widget.Events.READY, ()=>{
    scReady = true;
    scLoadedKey = '1:1';
    const cbs = scPending; scPending = [];
    cbs.forEach(fn=>fn());
  });
}
function stopAudio(){
  if(scWidget && scReady){
    scWidget.pause();
    if(progressHandler){ scWidget.unbind(SC.Widget.Events.PLAY_PROGRESS); progressHandler = null; }
    if(bacaProgressHandler){ scWidget.unbind(SC.Widget.Events.PLAY_PROGRESS); bacaProgressHandler = null; }
    scWidget.unbind(SC.Widget.Events.FINISH);
  }
  document.querySelectorAll('.play-dot.playing').forEach(el=>el.classList.remove('playing'));
  isPlayingBaca = false;
  updatePlayPauseIcon();
  updatePlayDotIcons();
}
// Putar satu segmen saja lalu berhenti di endMs (dipakai flashcard & tap manual di luar mode baca)
function playSegment(cd, track, startMs, endMs, btnEl){
  stopAudio();
  const urlFn = TRACK_URL[cd];
  if(!urlFn){
    toast(`Belum ada link audio utk CD${cd}.`);
    return;
  }
  if(btnEl) btnEl.classList.add('playing');
  ensureWidget(()=>{
    const key = `${cd}:${track}`;
    const startPlayback = ()=>{
      scWidget.seekTo(startMs);
      scWidget.play();
      progressHandler = (e)=>{ if(e.currentPosition >= endMs) stopAudio(); };
      scWidget.bind(SC.Widget.Events.PLAY_PROGRESS, progressHandler);
      scWidget.bind(SC.Widget.Events.FINISH, stopAudio);
    };
    if(scLoadedKey === key){
      startPlayback();
    } else {
      scWidget.load(urlFn(track), {
        callback: ()=>{ scLoadedKey = key; startPlayback(); }
      });
    }
  });
}

// ────────────────────────────────────────────────────────────────────────
// ENGINE "BACA-ALONG" — audio jalan terus, id/kalimat yg aktif ke-highlight
// otomatis mengikuti posisi audio. Player bar di bawah utk navigasi.
// ────────────────────────────────────────────────────────────────────────
function segTrackIndex(seg){ return seg.trackIdx; }

function loadAndPlayFromSeg(idx, autoplay){
  if(idx<0 || idx>=flatSegments.length) return;
  curSegIdx = idx;
  const seg = flatSegments[idx];
  const trackObj = UNITS[seg.trackIdx];
  const urlFn = TRACK_URL[trackObj.cd];
  if(!urlFn){ toast(`Belum ada link audio utk CD${trackObj.cd}.`); return; }
  if(trackPtr !== seg.trackIdx){
    trackPtr = seg.trackIdx;
    updatePlayerInfo();
  }
  ensureWidget(()=>{
    const key = `${trackObj.cd}:${trackObj.track}`;
    const afterReady = ()=>{
      scWidget.seekTo(seg.start);
      if(autoplay){ scWidget.play(); isPlayingBaca = true; }
      bindBacaProgress();
      highlightSeg(idx);
      updatePlayPauseIcon();
      updatePlayerInfo();
    };
    if(scLoadedKey === key){
      afterReady();
    } else {
      scWidget.load(urlFn(trackObj.track), { callback: ()=>{ scLoadedKey = key; afterReady(); } });
    }
  });
}
function bindBacaProgress(){
  if(bacaProgressHandler) scWidget.unbind(SC.Widget.Events.PLAY_PROGRESS);
  bacaProgressHandler = (e)=>{
    const pos = e.currentPosition;
    const segs = flatSegments.filter(s=>s.trackIdx===trackPtr);
    if(!segs.length) return;
    let active = segs[0];
    for(const s of segs){ if(s.start<=pos) active = s; else break; }
    const idx = flatSegments.indexOf(active);
    if(idx !== curSegIdx){ curSegIdx = idx; highlightSeg(idx); updatePlayerInfo(); }
  };
  scWidget.bind(SC.Widget.Events.PLAY_PROGRESS, bacaProgressHandler);
  scWidget.unbind(SC.Widget.Events.FINISH);
  scWidget.bind(SC.Widget.Events.FINISH, onTrackFinish);
}
function onTrackFinish(){
  // lanjut otomatis ke track berikutnya kalau ada, spt playthrough album
  if(trackPtr < UNITS.length-1){
    uiNextTrack(true);
  } else {
    isPlayingBaca = false;
    updatePlayPauseIcon();
    updatePlayDotIcons();
  }
}
function highlightSeg(idx){
  document.querySelectorAll('.kotoba-card.active, .kalimat-item.active').forEach(el=>el.classList.remove('active'));
  const seg = flatSegments[idx];
  if(!seg) return;
  const el = document.getElementById(seg.domId);
  if(el){
    el.classList.add('active');
    el.scrollIntoView({behavior:'smooth', block:'center'});
  }
  const fcEl = document.getElementById('fc-'+seg.domId);
  if(fcEl) fcEl.classList.add('active');
  updatePlayDotIcons();
}
function updatePlayDotIcons(){
  document.querySelectorAll('.kotoba-card .play-dot, .kalimat-item .play-dot').forEach(el=>{
    el.textContent = '▶';
    el.classList.remove('playing');
  });
  const seg = flatSegments[curSegIdx];
  if(seg && isPlayingBaca){
    const container = document.getElementById(seg.domId);
    const dot = container && container.querySelector('.play-dot');
    if(dot){ dot.textContent = '❚❚'; dot.classList.add('playing'); }
    const fcContainer = document.getElementById('fc-'+seg.domId);
    const fcDot = fcContainer && fcContainer.querySelector('.play-dot');
    if(fcDot){ fcDot.textContent = '❚❚'; fcDot.classList.add('playing'); }
  }
}
function updatePlayerInfo(){
  const bar = document.getElementById('player-bar');
  if(!bar) return;
  const trackObj = currentTrackObj();
  document.getElementById('pi-track').textContent = trackObj ? `CD${trackObj.cd}/T${trackObj.track}` : '—';
  const seg = flatSegments[curSegIdx];
  document.getElementById('pi-word').textContent = seg ? seg.label : (trackObj ? trackObj.tema[0] : '—');
  document.getElementById('pb-prevtrack').disabled = trackPtr<=0;
  document.getElementById('pb-nexttrack').disabled = trackPtr>=UNITS.length-1;
}
function updatePlayPauseIcon(){
  const btn = document.getElementById('pb-playpause');
  if(btn) btn.textContent = isPlayingBaca ? '❚❚' : '▶';
}
function uiPlayPause(){
  if(isPlayingBaca){
    scWidget && scWidget.pause();
    isPlayingBaca = false;
    updatePlayPauseIcon();
    updatePlayDotIcons();
  } else {
    const idx = curSegIdx>=0 ? curSegIdx : flatSegments.findIndex(s=>s.trackIdx===trackPtr);
    loadAndPlayFromSeg(idx<0?0:idx, true);
  }
}
function uiPrevId(){
  if(curSegIdx<=0) return;
  loadAndPlayFromSeg(curSegIdx-1, true);
}
function uiNextId(){
  if(curSegIdx>=flatSegments.length-1) return;
  loadAndPlayFromSeg(curSegIdx+1, true);
}
function uiPrevTrack(auto){
  if(trackPtr<=0) return;
  trackPtr -= 1;
  switchToTrackPtr(auto);
}
function uiNextTrack(auto){
  if(trackPtr>=UNITS.length-1) return;
  trackPtr += 1;
  switchToTrackPtr(auto);
}
function switchToTrackPtr(autoplay){
  const newUnit = currentTrackObj().unit;
  if(newUnit !== currentUnitNumber_rendered){
    document.getElementById('sel-unit').value = newUnit;
    updateUnitDropdownBtn();
    renderKosakata();
  }
  const idx = flatSegments.findIndex(s=>s.trackIdx===trackPtr);
  loadAndPlayFromSeg(idx<0?0:idx, !!autoplay);
}

// ────────────────────────────────────────────────────────────────────────
// TABS
// ────────────────────────────────────────────────────────────────────────
function switchTab(name){
  stopAudio();
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.tab===name));
  document.getElementById('view-kosakata').style.display = name==='kosakata' ? '' : 'none';
  document.getElementById('view-flashcard').style.display = name==='flashcard' ? '' : 'none';
  document.getElementById('player-bar').classList.add('show');
  if(name==='flashcard') renderFlashcard();
}

// ────────────────────────────────────────────────────────────────────────
// UNIT SELECTOR
// ────────────────────────────────────────────────────────────────────────
let currentUnitNumber_rendered = null;
function allUnitNumbers(){
  const seen = []; UNITS.forEach(u=>{ if(!seen.includes(u.unit)) seen.push(u.unit); });
  return seen;
}
function unitTitleFor(unitNum){
  const t = UNIT_TITLES.find(x=>x.unit===unitNum);
  return t ? t.tema : null;
}
function renderUnitSelect(){
  const sel = document.getElementById('sel-unit'); // tetap dipakai sbg penyimpan value
  const btn = document.getElementById('unit-dropdown-btn');
  const list = document.getElementById('unit-dropdown-list');
  sel.innerHTML = '';
  list.innerHTML = '';
  const withData = allUnitNumbers();
  // Tampilkan semua unit yg terdaftar di unitTitles (1-50); kalau unitTitles
  // kosong (fallback), pakai unit yg ada data-nya saja.
  const allNums = UNIT_TITLES.length
    ? UNIT_TITLES.map(t=>t.unit)
    : withData;

  function titleParts(unitNum){
    const title = unitTitleFor(unitNum);
    if(title) return [title[0], title[2]];
    const fallback = UNITS.find(u=>u.unit===unitNum).tema;
    return [fallback[0], fallback[2]];
  }

  allNums.forEach((unitNum)=>{
    const hasData = withData.includes(unitNum);
    const [line1, line2] = titleParts(unitNum);

    // opsi tersembunyi (penyimpan value asli, dibaca kode lain)
    sel.innerHTML += `<option value="${unitNum}" ${hasData?'':'disabled'}>Unit ${unitNum} — ${line1} / ${line2}</option>`;

    // item tampilan custom, 2 baris
    const item = document.createElement('div');
    item.className = 'unit-dropdown-item' + (hasData?'':' disabled');
    item.dataset.unit = unitNum;
    item.innerHTML = `<span class="u-prefix">Unit ${unitNum} —</span><div class="u-text"><div class="u-line1">${line1}</div><div class="u-line2">${line2}</div></div>`;
    if(hasData){
      item.onclick = ()=>{
        sel.value = unitNum;
        trackPtr = UNITS.findIndex(u=>u.unit===unitNum);
        list.classList.remove('open');
        onUnitChange();
      };
    }
    list.appendChild(item);
  });

  sel.value = currentTrackObj().unit;
  updateUnitDropdownBtn();

  btn.onclick = ()=>{ list.classList.toggle('open'); };
  document.addEventListener('click', (e)=>{
    if(!document.getElementById('unit-dropdown').contains(e.target)) list.classList.remove('open');
  });

  onUnitChange();
}
function updateUnitDropdownBtn(){
  const btn = document.getElementById('unit-dropdown-btn');
  const list = document.getElementById('unit-dropdown-list');
  const unitNum = currentTrackObj().unit;
  const title = unitTitleFor(unitNum);
  const fallback = UNITS.find(u=>u.unit===unitNum).tema;
  const line1 = title ? title[0] : fallback[0];
  const line2 = title ? title[2] : fallback[2];
  btn.innerHTML = `<span class="u-prefix">Unit ${unitNum} —</span><div class="u-text"><div class="u-line1">${line1}</div><div class="u-line2">${line2}</div></div>`;
  list.querySelectorAll('.unit-dropdown-item').forEach(el=>{
    el.classList.toggle('selected', +el.dataset.unit === unitNum);
  });
}
function onUnitChange(){
  const u = currentTrackObj();
  currentUnitNumber_rendered = u.unit;
  document.getElementById('unit-tag').textContent = `CD${u.cd} / Track ${u.track}`;
  updateUnitDropdownBtn();
  stopAudio();
  curSegIdx = -1;
  renderKosakata();
  fcOrder = u.data.map((_,i)=>i);
  fcIdx = 0;
  renderFlashcard();
}

// ────────────────────────────────────────────────────────────────────────
// KOSAKATA VIEW
// ────────────────────────────────────────────────────────────────────────
function renderKosakata(){
  const unitNum = currentUnitNumber_rendered;
  const trackIdxs = unitTrackRefs(unitNum);
  flatSegments = [];
  const wrap = document.getElementById('view-kosakata');
  let html = '';

  trackIdxs.forEach(ti=>{
    const u = UNITS[ti];
    html += `<div class="track-header"><span class="th-tema">Track ${u.track} — ${u.tema[2]} (${u.tema[0]})</span><span>CD${u.cd}/T${u.track}</span></div>`;
    u.data.forEach((entry,i)=>{
      const [kanji, yomi, arti, seg] = entry.kotoba;
      const domId = `seg-${ti}-${i}`;
      flatSegments.push({trackIdx:ti, entryIdx:i, kalimatIdx:null, start:seg[0], end:seg[1], domId, label:`${kanji} · ${yomi}`});

      const hasKalimat = entry.kalimat && entry.kalimat.length;
      const kalimatHtml = hasKalimat ? entry.kalimat.map((k,ki)=>{
        const [jp, ky, kid, kseg] = k;
        const kDomId = `seg-${ti}-${i}-${ki}`;
        flatSegments.push({trackIdx:ti, entryIdx:i, kalimatIdx:ki, start:kseg[0], end:kseg[1], domId:kDomId, label:jp});
        return `<div class="kalimat-item" id="${kDomId}">
          <div class="play-dot small" onclick="event.stopPropagation();jumpToSegByDom('${kDomId}')">▶</div>
          <div class="kalimat-text">
            <div class="kalimat-jp">${jp}</div>
            <div class="kalimat-yomi">${ky}</div>
            <div class="kalimat-id">${kid}</div>
          </div>
        </div>`;
      }).join('') : '';

      html += `<div class="kotoba-card" id="${domId}">
        <div class="kotoba-main" onclick="jumpToSegByDom('${domId}')">
          <div class="play-dot" onclick="event.stopPropagation();jumpToSegByDom('${domId}')">▶</div>
          <div class="kotoba-text">
            <div class="kotoba-kanji">${kanji}</div>
            <div class="kotoba-yomi">${yomi}</div>
            <div class="kotoba-arti">${arti}</div>
          </div>
        </div>
        <div class="kalimat-list">${kalimatHtml}</div>
      </div>`;
    });
  });

  wrap.innerHTML = html;
  // urutkan flatSegments berdasarkan urutan track (trackIdxs) lalu waktu, biar navigasi id konsisten
  flatSegments.sort((a,b)=> trackIdxs.indexOf(a.trackIdx)-trackIdxs.indexOf(b.trackIdx) || a.start-b.start);
  curSegIdx = -1;
  updatePlayerInfo();
}
function jumpToSegByDom(domId){
  const idx = flatSegments.findIndex(s=>s.domId===domId);
  if(idx<0) return;
  loadAndPlayFromSeg(idx, true);
}

// ────────────────────────────────────────────────────────────────────────
// FLASHCARD VIEW
// ────────────────────────────────────────────────────────────────────────
function renderFlashcard(){
  const ti = trackPtr;
  const u = UNITS[ti];
  if(!fcOrder.length) fcOrder = u.data.map((_,i)=>i);
  const i = fcOrder[fcIdx];
  const entry = u.data[i];
  const [kanji, yomi, arti] = entry.kotoba;
  document.getElementById('fc-pos').textContent = `${fcIdx+1} / ${fcOrder.length}`;
  document.getElementById('fc-prev').disabled = fcIdx<=0;
  document.getElementById('fc-next').disabled = fcIdx>=fcOrder.length-1;

  const domId = `seg-${ti}-${i}`;
  const hasKalimat = entry.kalimat && entry.kalimat.length;
  const kalimatHtml = hasKalimat ? entry.kalimat.map((k,ki)=>{
    const [jp, ky, kid] = k;
    const kDomId = `seg-${ti}-${i}-${ki}`;
    return `<div class="kalimat-item" id="fc-${kDomId}">
      <div class="play-dot small" onclick="event.stopPropagation();jumpToSegByDom('${kDomId}')">▶</div>
      <div class="kalimat-text">
        <div class="kalimat-jp">${jp}</div>
        <div class="kalimat-yomi">${ky}</div>
        <div class="kalimat-id">${kid}</div>
      </div>
    </div>`;
  }).join('') : '';

  document.getElementById('fc-card-wrap').innerHTML = `<div class="kotoba-card" id="fc-${domId}">
    <div class="kotoba-main" onclick="jumpToSegByDom('${domId}')">
      <div class="play-dot" onclick="event.stopPropagation();jumpToSegByDom('${domId}')">▶</div>
      <div class="kotoba-text">
        <div class="kotoba-kanji">${kanji}</div>
        <div class="kotoba-yomi">${yomi}</div>
        <div class="kotoba-arti">${arti}</div>
      </div>
    </div>
    <div class="kalimat-list">${kalimatHtml}</div>
  </div>`;
}
function fcNav(dir){
  stopAudio();
  fcIdx = Math.max(0, Math.min(fcOrder.length-1, fcIdx+dir));
  renderFlashcard();
}
function shuffleUnit(){
  for(let i=fcOrder.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [fcOrder[i],fcOrder[j]] = [fcOrder[j],fcOrder[i]];
  }
  fcIdx=0; renderFlashcard();
}
function resetUnitOrder(){
  fcOrder = currentTrackObj().data.map((_,i)=>i);
  fcIdx=0; renderFlashcard();
}

// ────────────────────────────────────────────────────────────────────────
// INIT
// ────────────────────────────────────────────────────────────────────────
(async function init(){
  try{
    await loadData();
  }catch(e){
    toast('Gagal memuat data kosakata (nihongotango_basic.json).');
    console.error(e);
    return;
  }
  renderUnitSelect();
})();
</script>
